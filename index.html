<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SolarKalender – PV‑Montageplaner</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body {
    font-family: Arial, sans-serif;
    background:#f5f6fa;
    padding:20px;
}
.container { max-width:900px; margin:auto; }
.card {
    background:white;
    padding:20px;
    border-radius:10px;
    margin-bottom:20px;
    box-shadow:0 3px 8px rgba(0,0,0,0.12);
}
input, button {
    width:100%;
    padding:12px;
    margin-top:10px;
    border-radius:6px;
    border:1px solid #ccc;
    font-size:16px;
}
button {
    background:#0067c4;
    color:white;
    border:none;
    cursor:pointer;
}
button:hover { background:#004f99; }

.task {
    padding:15px;
    background:white;
    border-left:6px solid #0067c4;
    margin-bottom:12px;
    border-radius:6px;
}
.done { background:#e4f7e4; border-left-color:#34a853; }

.btn-small {
    padding:6px 12px;
    width:auto;
    background:#ccc;
    margin-right:5px;
    cursor:pointer;
    border-radius:6px;
    border:none;
}
.btn-delete { background:#d9534f !important; color:white; }

/* ✅ Perfekte Sperrzeilen – ohne Überlappung */
.blocked-row {
    display:flex;
    justify-content:space-between;
    align-items:center;
    background:#ffe6e6;
    border-radius:6px;
    padding:10px 12px;
    margin-bottom:6px;
    font-size:16px;
}

/* ✅ X‑Button in eigener Spalte */
.blocked-delete {
    background:#d9534f;
    color:white;
    border:none;
    border-radius:4px;
    padding:4px 10px;
    font-size:14px;
    cursor:pointer;
}

.warn {
    padding:10px;
    background:#fff3cd;
    border-left:5px solid #ffcc00;
    margin-bottom:10px;
    border-radius:5px;
    font-weight:bold;
}
</style>
</head>
<body>

<div class="container">

<h1>SolarKalender – PV‑Montageplaner</h1>
<div id="warnBox"></div>

<button onclick="refreshPage()" 
        style="background:#888; color:white; border-radius:8px; margin-bottom:20px;">
    🔄 Seite aktualisieren
</button>

<!-- Neue Anlage -->
<div class="card">
<h2>Neue Anlage einplanen</h2>
<label>Kunde</label><input id="kunde">
<label>Startdatum</label><input id="start" type="date">
<label>Montagedauer (Tage)</label><input id="dauer" type="number" min="1" value="1">
<button onclick="addTask()">Anlage hinzufügen</button>
</div>

<!-- Sperrzeiten -->
<div class="card">
<h2>Gesperrte Tage (von‑bis)</h2>
<label>Von</label><input id="blockFrom" type="date">
<label>Bis</label><input id="blockTo" type="date">
<button onclick="addBlock()">Zeitraum sperren</button>

<h3>Gesperrte Zeiträume</h3>
<div id="blockedList"></div>
</div>

<!-- Anlagen -->
<div class="card">
<h2>Geplante Anlagen</h2>
<div id="taskList"></div>
</div>

</div>

<script>
// ---------------------------------------------------
// Speicher
// ---------------------------------------------------
let tasks = JSON.parse(localStorage.getItem('pv_tasks') || '[]');
let blocked = JSON.parse(localStorage.getItem('pv_blocked') || '[]');

function saveAll() {
    localStorage.setItem('pv_tasks', JSON.stringify(tasks));
    localStorage.setItem('pv_blocked', JSON.stringify(blocked));
}

function refreshPage() { location.reload(); }

function warn(txt){
    document.getElementById("warnBox").innerHTML = `<div class='warn'>${txt}</div>`;
    setTimeout(()=>document.getElementById("warnBox").innerHTML="",4000);
}

// ✅ Datum formatieren TT/MM/JJ
function fmt(dateStr){
    let d = new Date(dateStr);
    if (isNaN(d)) return dateStr;
    let dd = String(d.getDate()).padStart(2,"0");
    let mm = String(d.getMonth()+1).padStart(2,"0");
    let yy = String(d.getFullYear()).slice(2);
    return `${dd}/${mm}/${yy}`;
}

// ---------------------------------------------------
// Datumshilfen
// ---------------------------------------------------
function addDays(date,days){
    let d=new Date(date);
    d.setDate(d.getDate()+days);
    return d.toISOString().split("T")[0];
}

function getDaysRange(start,dauer){
    let out=[];
    for(let i=0;i<dauer;i++) out.push(addDays(start,i));
    return out;
}

function inBlocked(day){
    return blocked.some(r => day >= r.from && day <= r.to);
}

function isDayOccupied(day){
    return tasks.some(t => getDaysRange(t.start,t.dauer).includes(day));
}

function findNextFreeStart(start,dauer){
    while(true){
        let range=getDaysRange(start,dauer);
        if(!range.some(d=>inBlocked(d) || isDayOccupied(d)))
            return start;
        start = addDays(start,1);
    }
}

function autoShift(){
    tasks.sort((a,b)=>new Date(a.start)-new Date(b.start));
    for(let t of tasks)
        t.start = findNextFreeStart(t.start,t.dauer);
}

// ---------------------------------------------------
// Anlage
// ---------------------------------------------------
function addTask(){
    let kunde=document.getElementById("kunde").value;
    let start=document.getElementById("start").value;
    let dauer=parseInt(document.getElementById("dauer").value);

    if(!kunde || !start || dauer<1){
        warn("Bitte alle Felder eingeben!");
        return;
    }

    let newStart=findNextFreeStart(start,dauer);
    if(newStart!==start)
        warn("Blockiert/belegt – verschoben auf "+fmt(newStart));

    tasks.push({kunde,start:newStart,dauer,done:false});
    autoShift(); saveAll(); render();
}

// ---------------------------------------------------
// Sperrzeit hinzufügen
// ---------------------------------------------------
function addBlock(){
    let from=document.getElementById("blockFrom").value;
    let to=document.getElementById("blockTo").value;

    if(!from || !to){ warn("Bitte beide Daten eingeben!"); return; }
    if(new Date(to)<new Date(from)){ warn("Ungültiger Zeitraum!"); return; }

    blocked.push({from,to});
    autoShift(); saveAll(); render();
}

// ---------------------------------------------------
// Sperrzeit löschen
// ---------------------------------------------------
function deleteBlocked(i){
    blocked.splice(i,1);
    autoShift(); saveAll(); render();
}

// ---------------------------------------------------
// Render
// ---------------------------------------------------
function render(){

    // ✅ Gesperrte Zeiträume
    let bl=document.getElementById("blockedList");
    bl.innerHTML="";

    blocked.forEach((r,i)=>{
        let row=document.createElement("div");
        row.className="blocked-row";

        row.innerHTML = `
            <span>${fmt(r.from)} bis ${fmt(r.to)}</span>
            <button class="blocked-delete" onclick="deleteBlocked(${i})">X</button>
        `;

        bl.appendChild(row);
    });

    // ✅ Anlagenliste
    let list=document.getElementById("taskList");
    list.innerHTML="";
    tasks.sort((a,b)=>new Date(a.start)-new Date(b.start));

    tasks.forEach((t,i)=>{
        let end = addDays(t.start, t.dauer-1);

        let div=document.createElement("div");
        div.className="task"+(t.done?" done":"");

        div.innerHTML = `
            <strong>${t.kunde}</strong><br>
            Start: ${fmt(t.start)}<br>
            Ende: ${fmt(end)}<br>
            Dauer: ${t.dauer} Tage<br><br>
        `;

        let doneBtn=document.createElement("button");
        doneBtn.className="btn-small";
        doneBtn.innerText=t.done?"Erledigt zurück":"Als erledigt markieren";
        doneBtn.onclick=()=>{
            t.done=!t.done;
            autoShift(); saveAll(); render();
        };

        let delBtn=document.createElement("button");
        delBtn.className="btn-small btn-delete";
        delBtn.innerText="Löschen";
        delBtn.onclick=()=>{
            tasks.splice(i,1);
            autoShift(); saveAll(); render();
        };

        div.appendChild(doneBtn);
        div.appendChild(delBtn);

        list.appendChild(div);
    });
}

render();
</script>

</body>
</html>
