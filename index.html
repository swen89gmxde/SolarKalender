<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>SolarKalender – PV‑Montageplaner (LIVE SYNC)</title>
<meta name="viewport" content="width=device-width, initial-scale=1">

<!-- ✅ Firebase COMPAT SDK -->
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.7.0/firebase-firestore-compat.js"></script>

<style>
body { font-family: Arial, sans-serif; background:#f5f6fa; padding:20px; }
.container { max-width:900px; margin:auto; }
.card { background:white; padding:20px; border-radius:10px; margin-bottom:20px; box-shadow:0 3px 8px rgba(0,0,0,0.12); }
input, button, select {
    width:100%; padding:12px; margin-top:10px;
    border-radius:6px; border:1px solid #ccc; font-size:16px;
}
button { background:#0067c4; color:white; border:none; cursor:pointer; }
button:hover { background:#004f99; }

.task {
    padding:15px; background:white; border-left:6px solid #0067c4;
    margin-bottom:12px; border-radius:6px;
}

.btn-small {
    padding:6px 12px; width:auto; background:#ccc;
    margin-right:5px; cursor:pointer; border-radius:6px; border:none;
}
.btn-delete { background:#d9534f !important; color:white; }

.blocked-row {
    display:flex; justify-content:space-between; align-items:center;
    background:#ffe6e6; padding:10px 12px; border-radius:6px; margin-bottom:6px;
}
.blocked-delete {
    background:#d9534f; color:white; border:none;
    border-radius:4px; padding:4px 10px; cursor:pointer;
}

.warn {
    padding:10px; background:#fff3cd; border-left:5px solid #ffcc00;
    margin-bottom:10px; border-radius:5px; font-weight:bold;
}

.dialog-bg {
    position:fixed; top:0; left:0; width:100%; height:100%;
    background:rgba(0,0,0,0.6); display:flex; justify-content:center; align-items:center;
    z-index:9999; display:none;
}
.dialog-box {
    background:white; padding:20px; border-radius:12px; width:300px;
    box-shadow:0 4px 10px rgba(0,0,0,0.3);
}
.dialog-btn {
    width:100%; padding:10px; margin-top:10px;
    border-radius:6px; cursor:pointer; border:none; font-size:16px;
}
.dialog-red { background:#d9534f; color:white; }
.dialog-blue { background:#0067c4; color:white; }
</style>
</head>
<body>

<div class="container">

<h1>SolarKalender – PV‑Montageplaner (Live‑Sync)</h1>
<div id="warnBox"></div>

<button onclick="location.reload()" 
style="background:#888; color:white; border-radius:8px; margin-bottom:20px;">
🔄 Seite aktualisieren
</button>

<!-- Neue Anlage -->
<div class="card">
<h2>Neue Anlage einplanen</h2>

<label>Kunde</label>
<input id="kunde">

<label>Startdatum</label>
<input id="start" type="date">

<label>Enddatum</label>
<input id="end" type="date">

<button onclick="prepareAddTask()">Anlage hinzufügen</button>
</div>

<!-- Sperrzeiten -->
<div class="card">
<h2>Gesperrte Tage (von‑bis)</h2>

<label>Von</label><input id="blockFrom" type="date">
<label>Bis</label><input id="blockTo" type="date">

<button onclick="addBlock()">Zeitraum sperren</button>

<h3>Gesperrte Zeiträume</h3>
<div id="blockedList"></div>
</div>

<!-- Anlagen -->
<div class="card">
<h2>Geplante Anlagen</h2>
<div id="taskList"></div>
</div>

</div>


<!-- ✅ Konflikt-Popup -->
<div class="dialog-bg" id="conflictDialog">
<div class="dialog-box">
    <h3>Konflikt entdeckt</h3>
    <p>Der Zeitraum überschneidet sich mit bestehenden Einträgen.</p>

    <button class="dialog-btn dialog-red" onclick="cancelAddTask()">Abbrechen</button>
    <button class="dialog-btn" style="background:#ffaa00; color:white;" onclick="forceAddTask()">Trotzdem einplanen</button>
    <button class="dialog-btn dialog-blue" onclick="autoShiftAddTask()">Automatisch verschieben</button>
</div>
</div>

<script>
// ------------------------------------------------------------
// Firebase initialisieren
// ------------------------------------------------------------
firebase.initializeApp({
  apiKey: "AIzaSyCVW2N6uDTjYJec-tlw4ZGiJ_MjxWJLJjI",
  authDomain: "solarkalender-2bd58.firebaseapp.com",
  projectId: "solarkalender-2bd58",
  storageBucket: "solarkalender-2bd58.firebasestorage.app",
  messagingSenderId: "616937848687",
  appId: "1:616937848687:web:8772cdb5f6b521e36a329a"
});
const db = firebase.firestore();

const tasksRef = db.collection("tasks");
const blockedRef = db.collection("blocked");

let tasks = [];
let blocked = [];

let pendingTask = null;


// ------------------------------------------------------------
// Echtzeitlistener
// ------------------------------------------------------------
tasksRef.onSnapshot(s => { tasks = s.docs.map(d=>({id:d.id,...d.data()})); autoRecalc(); render(); });
blockedRef.onSnapshot(s=>{ blocked = s.docs.map(d=>({id:d.id,...d.data()})); autoRecalc(); render(); });


// ------------------------------------------------------------
// Hilfen
// ------------------------------------------------------------
function fmt(d){
  let x=new Date(d);
  return String(x.getDate()).padStart(2,"0")+"/"+String(x.getMonth()+1).padStart(2,"0")+"/"+String(x.getFullYear()).slice(2);
}
function addDays(d,n){ let x=new Date(d); x.setDate(x.getDate()+n); return x.toISOString().split("T")[0]; }
function getRange(start,end){
  let arr=[], d=new Date(start), e=new Date(end);
  while(d<=e){ arr.push(d.toISOString().split("T")[0]); d.setDate(d.getDate()+1); }
  return arr;
}
function inBlocked(d){ return blocked.some(b=>d>=b.from && d<=b.to); }
function anyOverlap(start,end){
  let r=getRange(start,end);
  return tasks.some(t=> getRange(t.start,t.end).some(d=>r.includes(d)) );
}


// ------------------------------------------------------------
// Konflikt-Dialog LOGIK
// ------------------------------------------------------------
function prepareAddTask(){
    let kunde=document.getElementById("kunde").value;
    let start=document.getElementById("start").value;
    let end=document.getElementById("end").value;

    if(!kunde || !start || !end || end<start){
        warn("Bitte gültige Daten eingeben!");
        return;
    }

    pendingTask = { kunde, start, end, status:"Offen" };

    let r = getRange(start,end);

    if(r.some(inBlocked) || anyOverlap(start,end)){
        document.getElementById("conflictDialog").style.display="flex";
    } else {
        saveTask(pendingTask);
    }
}

function cancelAddTask(){
    pendingTask=null;
    document.getElementById("conflictDialog").style.display="none";
}

function forceAddTask(){
    saveTask(pendingTask); // ✅ Option 1: exakt speichern
    closeDialog();
}

function autoShiftAddTask(){
    let t=pendingTask;

    while(anyOverlap(t.start,t.end) || getRange(t.start,t.end).some(inBlocked)){
        t.start=addDays(t.start,1);
        t.end=addDays(t.end,1);
    }
    saveTask(t);
    closeDialog();
}

function closeDialog(){
    pendingTask=null;
    document.getElementById("conflictDialog").style.display="none";
}

function saveTask(t){
    tasksRef.add(t);
}


// ------------------------------------------------------------
// Sperrzeiten
// ------------------------------------------------------------
function addBlock(){
    let f=document.getElementById("blockFrom").value;
    let to=document.getElementById("blockTo").value;
    if(!f||!to||to<f){ warn("Ungültiger Zeitraum!"); return;}
    blockedRef.add({from:f,to:to});
}
function deleteBlocked(id){ blockedRef.doc(id).delete(); }


// ------------------------------------------------------------
// Automatische Verschiebung (für spätere Anlagen)
// ------------------------------------------------------------
function autoRecalc(){
    tasks.sort((a,b)=>new Date(a.start)-new Date(b.start));

    for(let i=0;i<tasks.length;i++){
        let t=tasks[i];
        let start=t.start;
        let end=t.end;

        while(
          anyOverlap(start,end) || 
          getRange(start,end).some(inBlocked)
        ){
            start=addDays(start,1);
            end=addDays(end,1);
        }

        if(start!==t.start){
            tasksRef.doc(t.id).update({start:start,end:end});
        }
    }
}


// ------------------------------------------------------------
// Rendering
// ------------------------------------------------------------
function warn(txt){
    document.getElementById("warnBox").innerHTML=`<div class='warn'>${txt}</div>`;
    setTimeout(()=>document.getElementById("warnBox").innerHTML="",5000);
}

function render(){

    // Sperrzeiten
    let bl=document.getElementById("blockedList");
    bl.innerHTML="";
    blocked.forEach(b=>{
        let row=document.createElement("div");
        row.className="blocked-row";
        row.innerHTML = `
            <span>${fmt(b.from)} bis ${fmt(b.to)}</span>
            <button class="blocked-delete" onclick="deleteBlocked('${b.id}')">X</button>
        `;
        bl.appendChild(row);
    });

    // Anlagen
    let tl=document.getElementById("taskList");
    tl.innerHTML="";
    tasks.sort((a,b)=>new Date(a.start)-new Date(b.start));
    tasks.forEach(t=>{
        let d=document.createElement("div");
        d.className="task";
        d.innerHTML=`
        <strong>${t.kunde}</strong><br>
        Von: ${fmt(t.start)}<br>
        Bis: ${fmt(t.end)}<br><br>
        `;

        let sel=document.createElement("select");
        ["Offen","DC begonnen","DC abgeschlossen","Erledigt"].forEach(s=>{
           sel.innerHTML+=`<option ${t.status===s?"selected":""}>${s}</option>`;
        });
        sel.onchange=()=> tasksRef.doc(t.id).update({status:sel.value});

        let del=document.createElement("button");
        del.className="btn-small btn-delete";
        del.innerText="Löschen";
        del.onclick=()=>tasksRef.doc(t.id).delete();

        d.appendChild(sel);
        d.appendChild(del);

        tl.appendChild(d);
    });

}

</script>

</body>
</html>
